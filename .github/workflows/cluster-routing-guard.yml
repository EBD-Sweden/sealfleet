name: Cluster routing guard

on:
  pull_request:
    paths:
      - 'runtime/manifests/**'
      - 'runtime/router.py'
      - 'runtime/cli.py'
      - 'runtime/tests/test_cluster_service_routing.py'
      - 'runtime/tests/test_mcpfinder_cli.py'
      - 'config/**'
      - 'mcps/**/mcp.yaml'
      - 'k8s/**'
      - 'scripts/check-cluster-routing.sh'
      - 'scripts/mcpfinder-cli'
      - 'scripts/mcpfinder_cli.py'
      - '.github/workflows/cluster-routing-guard.yml'
  push:
    branches: [ main, master ]
    paths:
      - 'runtime/manifests/**'
      - 'runtime/router.py'
      - 'runtime/cli.py'
      - 'runtime/tests/test_cluster_service_routing.py'
      - 'runtime/tests/test_mcpfinder_cli.py'
      - 'config/**'
      - 'mcps/**/mcp.yaml'
      - 'k8s/**'
      - 'scripts/check-cluster-routing.sh'
      - 'scripts/mcpfinder-cli'
      - 'scripts/mcpfinder_cli.py'
      - '.github/workflows/cluster-routing-guard.yml'

jobs:
  cluster-routing:
    name: Reject host/localhost MCP routing and verify MCP CLI
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r runtime/requirements.txt pytest pyyaml

      - name: Run cluster routing guard
        run: scripts/check-cluster-routing.sh

      - name: Run MCP server CLI acceptance tests
        run: python -m pytest runtime/tests/test_mcpfinder_cli.py -q
