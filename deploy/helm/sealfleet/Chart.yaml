apiVersion: v2
name: sealfleet
description: |
  Sealfleet — open-source MCP Agent Platform. Deploys the full control plane
  (registry, deploy service, runtime router, portal), a one-shot DB migrate/seed
  Job, Ingress+TLS, an encrypted Postgres backup CronJob, and a Secret stub for
  platform credentials. Supports external managed Postgres (RDS/Cloud SQL) or an
  in-cluster Postgres for evaluation.
type: application

# Chart version — bump on chart changes.
version: 0.2.0

# Default application version (image tag). Override via image.tag in values.yaml.
appVersion: "0.2.0"

keywords:
  - mcp
  - model-context-protocol
  - agent-platform
  - mcpfinder

home: https://github.com/EBD-Sweden/sealfleet
sources:
  - https://github.com/EBD-Sweden/sealfleet

maintainers:
  - name: Sealfleet
