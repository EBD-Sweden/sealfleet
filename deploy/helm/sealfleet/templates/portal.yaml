{{- if .Values.portal.enabled }}
{{- $name := include "mcpfinder.componentName" (dict "ctx" . "component" "portal") }}
{{- $registry := include "mcpfinder.componentName" (dict "ctx" . "component" "registry") }}
{{- $router := include "mcpfinder.componentName" (dict "ctx" . "component" "router") }}
{{- $deploy := include "mcpfinder.componentName" (dict "ctx" . "component" "deploy") }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    {{- include "mcpfinder.labels" . | nindent 4 }}
    app.kubernetes.io/component: portal
    app: {{ $name }}
spec:
  replicas: {{ .Values.portal.replicas }}
  selector:
    matchLabels:
      {{- include "mcpfinder.selectorLabels" (dict "ctx" . "component" "portal") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mcpfinder.selectorLabels" (dict "ctx" . "component" "portal") | nindent 8 }}
        part-of: mcpfinder
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml (.Values.portal.podSecurityContext | default .Values.podSecurityContext) | nindent 8 }}
      containers:
        - name: portal
          image: {{ include "mcpfinder.image" (dict "ctx" . "svc" .Values.portal) | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - containerPort: {{ .Values.portal.port }}
          env:
            - name: PORT
              value: {{ .Values.portal.port | quote }}
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: NODE_ENV
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "mcpfinder.secretName" . }}
                  key: DATABASE_URL
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "mcpfinder.secretName" . }}
                  key: NEXTAUTH_SECRET
            - name: REGISTRY_URL
              value: "http://{{ $registry }}:{{ .Values.registry.port }}"
            - name: RUNTIME_URL
              value: "http://{{ $router }}:{{ .Values.router.port }}"
            - name: DEPLOY_URL
              value: "http://{{ $deploy }}:{{ .Values.deploy.port }}"
            - name: NEXTAUTH_URL
              value: {{ include "mcpfinder.portalUrl" . | quote }}
            - name: AUTH_URL
              value: {{ include "mcpfinder.portalUrl" . | quote }}
            {{- range $k, $v := .Values.portal.extraEnv }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          readinessProbe:
            httpGet: { path: /api/ready, port: {{ .Values.portal.port }} }
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            {{- toYaml .Values.portal.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    {{- include "mcpfinder.labels" . | nindent 4 }}
    app.kubernetes.io/component: portal
    app: {{ $name }}
spec:
  type: ClusterIP
  selector:
    {{- include "mcpfinder.selectorLabels" (dict "ctx" . "component" "portal") | nindent 4 }}
  ports:
    - port: {{ .Values.portal.port }}
      targetPort: {{ .Values.portal.port }}
      name: http
{{- end }}
