{{- if and .Values.secrets.create (not .Values.secrets.existingSecret) }}
# Platform Secret STUB. Replace every CHANGE_ME value before production use, or
# set secrets.create=false and reference an externally managed Secret with the
# same keys (secrets.existingSecret).
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mcpfinder.secretName" . }}
  labels:
    {{- include "mcpfinder.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  DATABASE_URL: {{ include "mcpfinder.databaseUrl" . | quote }}
  ENCRYPTION_KEY: {{ .Values.secrets.encryptionKey | quote }}
  ROUTER_RS256_PRIVATE_KEY: |-
{{ .Values.secrets.routerRs256PrivateKey | indent 4 }}
  NEXTAUTH_SECRET: {{ .Values.secrets.nextauthSecret | quote }}
{{- end }}
