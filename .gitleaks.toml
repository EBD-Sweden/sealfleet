# Gitleaks config — extends the default rules with allowlists for values that
# are deliberately public (seeded local-dev credentials) and test fixtures.

[extend]
useDefault = true

[allowlist]
description = "Deliberate non-secrets"
paths = [
  '''runtime/tests/.*''',
  '''portal/src/__tests__/.*''',
  '''deploy/tests/.*''',
]
regexes = [
  # The old local-dev operator key is no longer in the working tree (it's now
  # generated per-deployment by the keygen service), but it remains in this
  # private repo's GIT HISTORY, so it stays allowlisted to keep history scans green.
  '''loHPxndS1CBmn-dLHBZwvliXV7ixPyWU_5hlZo-VwpA''',
]
