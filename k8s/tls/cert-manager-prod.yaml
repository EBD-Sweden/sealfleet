# Sealfleet PRODUCTION TLS via cert-manager (ACME / Let's Encrypt).
#
# SOC 2 CC6.7 — production edge TLS with automated issuance + renewal.
#
# DO NOT apply this on the dev k3d cluster as-is: it requires cert-manager to be
# installed AND a publicly resolvable DNS name + reachable :80 for the HTTP-01
# challenge (or DNS-01 with a provider solver). On the current dev cluster the
# self-signed path (gen-selfsigned-cert.sh + ingress.yaml) is used instead.
#
# Install cert-manager first (one-time, prod cluster only):
#   kubectl apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml
#
# Then apply this file, and on the Ingress set:
#   metadata.annotations["cert-manager.io/cluster-issuer"] = "letsencrypt-prod"
# cert-manager will provision the `mcpfinder-tls` Secret automatically.
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  labels:
    part-of: mcpfinder
    soc2-control: cc6.7
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: security@mcpfinder.example   # replace with the real ops contact
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            class: traefik
---
# Optional: a self-signed ClusterIssuer for clusters where cert-manager IS
# installed but ACME is not reachable (internal/air-gapped). This gives you
# cert-manager-managed certs without an external CA.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: mcpfinder-selfsigned
  labels:
    part-of: mcpfinder
    soc2-control: cc6.7
spec:
  selfSigned: {}
---
# Certificate object that drives the `mcpfinder-tls` Secret when cert-manager
# is present. Switch issuerRef.name to letsencrypt-prod for public certs.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: mcpfinder-tls
  namespace: default
  labels:
    part-of: mcpfinder
    soc2-control: cc6.7
spec:
  secretName: mcpfinder-tls
  duration: 2160h     # 90d
  renewBefore: 360h   # 15d
  issuerRef:
    name: mcpfinder-selfsigned
    kind: ClusterIssuer
  dnsNames:
    - router.sealfleet.local
    - deploy.sealfleet.local
    - registry.sealfleet.local
    - portal.sealfleet.local
