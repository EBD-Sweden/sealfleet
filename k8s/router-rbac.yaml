apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-router-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mcp-scaler
  namespace: default
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mcp-router-scaler
  namespace: default
subjects:
  - kind: ServiceAccount
    name: mcp-router-sa
    namespace: default
roleRef:
  kind: Role
  name: mcp-scaler
  apiGroup: rbac.authorization.k8s.io
