apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-registry
  namespace: default
  labels:
    app: mcp-registry
    part-of: mcpfinder
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-registry
  template:
    metadata:
      labels:
        app: mcp-registry
    spec:
      containers:
        - name: mcp-registry
          image: mcpfinder-registry:5050/mcp-registry:latest
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8010
          envFrom:
            - secretRef:
                name: mcpfinder-database
          readinessProbe:
            httpGet:
              path: /ready
              port: 8010
            initialDelaySeconds: 8
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8010
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-registry
  namespace: default
spec:
  type: NodePort
  selector:
    app: mcp-registry
  ports:
    - port: 8010
      targetPort: 8010
      nodePort: 30010
